    // ── DatabaseRenderer ──────────────────────────────────────────────────
    class DatabaseRenderer {
      constructor(bus, config, themes) {
        this.bus = bus;
        this.config = config;
        this.themes = themes;
        this.svg = d3.select('#main-svg');
        this.targetCells = [];
        this.targetCellGrid = null;
        this.sourceCellGrids = null; // per-partition grids
        this.setupSVG();
        this.bus.on('config-changed', () => this.render());
      }

      setupSVG() {
        const defs = this.svg.append('defs');
        const glowFilter = defs.append('filter')
          .attr('id', 'glow-scan')
          .attr('x', '-50%').attr('y', '-50%')
          .attr('width', '200%').attr('height', '200%');
        glowFilter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
        glowFilter.append('feFlood').attr('flood-color', 'rgba(234, 179, 8, 0.6)').attr('result', 'color');
        glowFilter.append('feComposite').attr('in', 'color').attr('in2', 'blur').attr('operator', 'in').attr('result', 'glow');
        const glowMerge = glowFilter.append('feMerge');
        glowMerge.append('feMergeNode').attr('in', 'glow');
        glowMerge.append('feMergeNode').attr('in', 'SourceGraphic');

        defs.append('filter')
          .attr('id', 'bottleneck-glow-filter')
          .attr('x', '-30%').attr('y', '-30%')
          .attr('width', '160%').attr('height', '160%')
          .append('feDropShadow')
          .attr('dx', 0).attr('dy', 0)
          .attr('stdDeviation', 4)
          .attr('flood-color', '#ef4444')
          .attr('flood-opacity', 0.6);

        this.bgLayer = this.svg.append('g').attr('class', 'bg-layer');
        this.connectionLayer = this.svg.append('g').attr('class', 'connection-layer');
        this.particleLayer = this.svg.append('g').attr('class', 'particle-layer');
        this.dbLayer = this.svg.append('g').attr('class', 'db-layer');
        this.sourceVizLayer = this.svg.append('g').attr('class', 'source-viz-layer');
        this.targetVizLayer = this.svg.append('g').attr('class', 'target-viz-layer');
        this.labelLayer = this.svg.append('g').attr('class', 'label-layer');

        // Defer initial render to after layout is settled
        requestAnimationFrame(() => {
          this.render();
        });

        window.addEventListener('resize', () => {
          this.render();
          this.bus.emit('layout-changed');
        });
      }

      getLayout() {
        const svgEl = this.svg.node();
        const w = svgEl.clientWidth || 1200;
        const h = svgEl.clientHeight || 500;
        const padding = 30;
        const dbWidth = w * 0.13;
        const flowWidth = w * 0.14;
        const syncWidth = w * 0.18;
        const dbHeight = h * 0.65;
        const gaugeWidth = 22;
        const gaugeGap = 8;
        const gaugeAreaWidth = 22;  // single IO/CPU bar, width scales with ACU
        const topY = (h - dbHeight) / 2;

        const sourceX = padding;
        const sourceGaugeX = sourceX + dbWidth + gaugeGap;
        const flowLeftX = sourceGaugeX + gaugeAreaWidth + gaugeGap;
        const syncX = flowLeftX + flowWidth;
        const flowRightX = syncX + syncWidth;
        const targetGaugeX = flowRightX + flowWidth;
        const targetX = targetGaugeX + gaugeAreaWidth + gaugeGap;

        return {
          width: w, height: h, padding,
          source: { x: sourceX, y: topY, width: dbWidth, height: dbHeight },
          sourceGauges: { x: sourceGaugeX, y: topY, width: gaugeWidth },
          flowLeft: { x: flowLeftX, y: 0, width: flowWidth, height: h },
          syncNodes: { x: syncX, y: topY, width: syncWidth, height: dbHeight },
          flowRight: { x: flowRightX, y: 0, width: flowWidth, height: h },
          targetGauges: { x: targetGaugeX, y: topY, width: gaugeWidth },
          target: { x: targetX, y: topY, width: dbWidth, height: dbHeight },
        };
      }

      render() {
        const layout = this.getLayout();
        const cfg = this.config.getAll();
        const themeName = cfg.theme;

        this.dbLayer.selectAll('*').remove();
        this.labelLayer.selectAll('*').remove();
        this.resetSourceViz();
        this.resetTargetViz();

        // Source database with partitions
        this.drawDatabase(layout.source, Labels.source, Labels.sourceDB(), this.themes.themes[themeName]['--db-source']);
        this.drawPartitions(layout.source, cfg.partitionCount, themeName);

        // Target database (single block, no partitions)
        this.drawDatabase(layout.target, Labels.target, Labels.targetDB(), this.themes.themes[themeName]['--db-target']);

        // IO/CPU gauges for both databases
        this.drawGauges(layout.sourceGauges, layout.source.height, 'source');
        this.drawGauges(layout.targetGauges, layout.target.height, 'target');

        // Sync nodes
        this.drawSyncNodes(layout.syncNodes, cfg.syncNodeCount, themeName);
      }

      drawDatabase(rect, label, sublabel, color) {
        this.dbLayer.append('rect')
          .attr('class', 'db-block')
          .attr('x', rect.x).attr('y', rect.y)
          .attr('width', rect.width).attr('height', rect.height)
          .attr('fill', color).attr('fill-opacity', 0.15)
          .attr('stroke', color);

        this.labelLayer.append('text')
          .attr('class', 'db-label')
          .attr('x', rect.x + rect.width / 2)
          .attr('y', rect.y - 12)
          .attr('fill', color)
          .text(label);

        this.labelLayer.append('text')
          .attr('class', 'db-sublabel')
          .attr('x', rect.x + rect.width / 2)
          .attr('y', rect.y + rect.height + 20)
          .text(sublabel);
      }

      drawPartitions(rect, count, themeName) {
        const gap = 3;
        const colors = this.themes.themes[themeName]['--stream-colors'];
        const fractions = this.config._getPartitionHeights();
        const totalH = rect.height - gap * 2 * count;

        let cursor = rect.y;
        for (let i = 0; i < count; i++) {
          const partH = totalH * fractions[i];
          const py = Math.round(cursor + gap);
          const ph = Math.round(partH);
          cursor += partH + gap * 2;

          this.dbLayer.append('rect')
            .attr('class', 'partition-rect')
            .attr('data-partition', i)
            .attr('x', rect.x + 2).attr('y', py)
            .attr('width', rect.width - 4).attr('height', ph)
            .attr('fill', 'none')
            .attr('stroke', colors[i % 16]).attr('stroke-opacity', 0.3)
            .attr('rx', 3).attr('ry', 3);

          this.labelLayer.append('text')
            .attr('class', 'partition-label')
            .attr('x', rect.x + rect.width / 2)
            .attr('y', Math.round(py + ph / 2 + 4))
            .text(`P${i + 1}`);
        }
      }

      _buildSourceGrid(partCount) {
        const layout = this.getLayout();
        const rect = layout.source;
        const gap = 3;
        const pad = 4;
        const cellSize = 4;
        const cellGap = 1;
        const step = cellSize + cellGap;
        const fractions = this.config._getPartitionHeights();
        const totalH = rect.height - gap * 2 * partCount;

        this.sourceCellGrids = [];
        let cursor = rect.y;
        for (let i = 0; i < partCount; i++) {
          const partH = totalH * fractions[i];
          const py = Math.round(cursor + gap);
          const ph = Math.round(partH);
          cursor += partH + gap * 2;
          const areaW = rect.width - pad * 2;
          const areaH = ph - pad * 2;
          const cols = Math.max(1, Math.floor(areaW / step));
          const rows = Math.max(1, Math.floor(areaH / step));
          const gridW = cols * step - cellGap;
          const gridH = rows * step - cellGap;
          const offsetX = rect.x + pad + (areaW - gridW) / 2;
          const offsetY = py + pad + (areaH - gridH) / 2;
          const totalCells = cols * rows;

          // Build cells top-to-bottom (drain removes from top)
          const cells = [];
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              cells.push({ row: r, col: c, idx: i * 10000 + r * cols + c });
            }
          }

          this.sourceCellGrids.push({
            partition: i, cols, rows, totalCells, cellSize, step,
            offsetX, offsetY, cells
          });
        }
      }

      updateSourceViz(partDrain, themeName) {
        const partCount = partDrain.length;
        const colors = this.themes.themes[themeName]['--stream-colors'];

        if (!this.sourceCellGrids) {
          this._buildSourceGrid(partCount);
        }

        const allCells = [];
        for (let i = 0; i < partCount; i++) {
          const grid = this.sourceCellGrids[i];
          const progress = partDrain[i]; // 0 = full, 1 = empty
          const cellsToRemove = Math.floor(progress * grid.totalCells);
          const cellsToShow = grid.totalCells - cellsToRemove;
          // Show cells from bottom (keep bottom cells, remove from top)
          const visible = grid.cells.slice(grid.cells.length - cellsToShow);
          visible.forEach(cell => {
            allCells.push({ ...cell, color: colors[i % 16], grid });
          });
        }

        const layer = this.sourceVizLayer;
        const rects = layer.selectAll('rect').data(allCells, d => d.idx);
        rects.exit().remove();
        rects.enter().append('rect')
          .attr('x', d => d.grid.offsetX + d.col * d.grid.step)
          .attr('y', d => d.grid.offsetY + d.row * d.grid.step)
          .attr('width', d => d.grid.cellSize)
          .attr('height', d => d.grid.cellSize)
          .attr('fill', d => d.color)
          .attr('fill-opacity', 0.7)
          .attr('rx', 1).attr('ry', 1);
      }

      resetSourceViz() {
        this.sourceVizLayer.selectAll('*').remove();
        this.sourceCellGrids = null;
      }

      // progress: 0 = empty, 1 = full
      updateTargetFill(progress) {
        const layout = this.getLayout();
        const themeName = this.config.get('theme');
        const color = this.themes.themes[themeName]['--db-target'];
        const fillHeight = layout.target.height * Math.min(1, progress);

        this.dbLayer.selectAll('.target-fill').remove();

        if (fillHeight > 0) {
          this.dbLayer.append('rect')
            .attr('class', 'target-fill')
            .attr('x', layout.target.x + 2)
            .attr('y', layout.target.y + layout.target.height - fillHeight)
            .attr('width', layout.target.width - 4)
            .attr('height', fillHeight)
            .attr('fill', color).attr('fill-opacity', 0.3)
            .attr('rx', 3).attr('ry', 3);
        }
      }

      drawGauges(gaugeArea, dbHeight, prefix) {
        const acu = this.config.get(prefix === 'source' ? 'sourceACU' : 'targetACU');
        const acuFrac = acu / 64;
        const barWidth = Math.round(8 + acuFrac * 14);   // 8-22px
        const barHeight = Math.round(dbHeight * (0.25 + acuFrac * 0.35)); // 25%-60%
        const x = gaugeArea.x + (22 - barWidth) / 2;     // center in gauge area
        const y = gaugeArea.y + (dbHeight - barHeight) / 2;

        this.dbLayer.append('rect')
          .attr('class', 'gauge-bar-bg')
          .attr('x', x).attr('y', y)
          .attr('width', barWidth).attr('height', barHeight);

        this.dbLayer.append('rect')
          .attr('class', `gauge-bar-fill gauge-${prefix}`)
          .attr('x', x + 1).attr('y', y + barHeight)
          .attr('width', barWidth - 2).attr('height', 0)
          .attr('fill', '#3b82f6');

        this.labelLayer.append('text')
          .attr('class', 'gauge-label')
          .attr('x', x + barWidth / 2)
          .attr('y', y + barHeight + 14)
          .text('ACU');

        this.labelLayer.append('text')
          .attr('class', 'gauge-label')
          .attr('x', x + barWidth / 2)
          .attr('y', y + barHeight + 24)
          .attr('font-size', '8px')
          .text('(IO/CPU)');

        this.labelLayer.append('text')
          .attr('class', `gauge-value gauge-value-${prefix}`)
          .attr('x', x + barWidth / 2)
          .attr('y', y - 4)
          .text('0%');
      }

      updateGauge(prefix, percent) {
        const layout = this.getLayout();
        const gaugeArea = prefix === 'source' ? layout.sourceGauges : layout.targetGauges;
        const dbHeight = layout.source.height;
        const acu = this.config.get(prefix === 'source' ? 'sourceACU' : 'targetACU');
        const acuFrac = acu / 64;
        const barWidth = Math.round(8 + acuFrac * 14);
        const barHeight = Math.round(dbHeight * (0.25 + acuFrac * 0.35));
        const x = gaugeArea.x + (22 - barWidth) / 2;
        const y = gaugeArea.y + (dbHeight - barHeight) / 2;

        const fillHeight = (barHeight - 2) * (percent / 100);
        const color = percent < 50 ? '#3b82f6' : percent < 80 ? '#2563eb' : '#1d4ed8';

        this.dbLayer.select(`.gauge-${prefix}`)
          .attr('x', x + 1)
          .attr('y', y + barHeight - fillHeight)
          .attr('width', barWidth - 2)
          .attr('height', fillHeight)
          .attr('fill', color);

        this.labelLayer.select(`.gauge-value-${prefix}`)
          .text(Math.round(percent) + '%');
      }

      getSyncCpuBarWidth() {
        const vcpu = this.config.get('vcpuPerNode');
        return Math.round(vcpu * 2); // 2px per vCPU: 2px at 1, 8px at 4, 64px at 32
      }

      drawSyncNodes(area, count, themeName) {
        const nodeGap = 20;
        const cpuBarWidth = this.getSyncCpuBarWidth();
        const cpuBarGap = 6;
        const boxWidth = area.width - cpuBarWidth - cpuBarGap;
        const nodeHeight = (area.height - (count - 1) * nodeGap) / count;
        const color = this.themes.themes[themeName]['--accent-secondary'];
        const colors = this.themes.themes[themeName]['--stream-colors'];

        for (let i = 0; i < count; i++) {
          const nodeY = area.y + i * (nodeHeight + nodeGap);

          // Sync node box (narrower)
          this.dbLayer.append('rect')
            .attr('class', 'sync-node-rect')
            .attr('data-sync-node', i)
            .attr('x', area.x).attr('y', nodeY)
            .attr('width', boxWidth).attr('height', nodeHeight)
            .attr('fill', color).attr('fill-opacity', 0.05)
            .attr('stroke', color).attr('stroke-opacity', 0.4);

          // CPU bar background (right of box, shorter than node)
          const barX = area.x + boxWidth + cpuBarGap;
          const barHeight = Math.max(16, (nodeHeight - 16) / 2);
          const barPad = (nodeHeight - barHeight) / 2;
          this.dbLayer.append('rect')
            .attr('class', 'sync-cpu-bar-bg')
            .attr('x', barX).attr('y', nodeY + barPad)
            .attr('width', cpuBarWidth).attr('height', barHeight)
            .attr('fill', 'var(--bg-secondary)')
            .attr('stroke', 'var(--border)').attr('stroke-width', 1)
            .attr('rx', 2).attr('ry', 2);

          // CPU bar fill (bottom-up)
          this.dbLayer.append('rect')
            .attr('class', 'sync-node-fill')
            .attr('data-sync-node-fill', i)
            .attr('x', barX + 1).attr('y', nodeY + barPad + barHeight)
            .attr('width', cpuBarWidth - 2).attr('height', 0)
            .attr('fill', '#22c55e')
            .attr('rx', 1).attr('ry', 1);

          // Node label
          this.labelLayer.append('text')
            .attr('class', 'sync-node-label')
            .attr('x', area.x + boxWidth / 2)
            .attr('y', nodeY - 6)
            .attr('fill', color)
            .text(Labels.nodeName(i));

          // CPU label above the bar
          this.labelLayer.append('text')
            .attr('class', 'gauge-label')
            .attr('x', barX + cpuBarWidth / 2)
            .attr('y', nodeY + barPad - 4)
            .attr('text-anchor', 'middle')
            .text('CPU');

          // CPU percentage text (below the bar)
          this.labelLayer.append('text')
            .attr('class', 'sync-node-cpu')
            .attr('data-sync-cpu-text', i)
            .attr('x', barX + cpuBarWidth / 2)
            .attr('y', nodeY + barPad + barHeight + 12)
            .attr('text-anchor', 'middle')
            .attr('fill', 'var(--text-secondary)')
            .text('0%');

          // Stream assignment indicators
          const streamAssignment = this.config.getNodeAssignment();
          const assignedStreams = streamAssignment[i] || [];
          const dotSize = 6;
          const dotGap = 3;
          const dotsStartX = area.x + (boxWidth - assignedStreams.length * (dotSize + dotGap)) / 2;
          const dotsY = nodeY + nodeHeight - 16;
          assignedStreams.forEach((streamIdx, d) => {
            this.labelLayer.append('circle')
              .attr('class', 'sync-stream-dot')
              .attr('cx', dotsStartX + d * (dotSize + dotGap) + dotSize / 2)
              .attr('cy', dotsY)
              .attr('r', dotSize / 2)
              .attr('fill', colors[streamIdx % 16])
              .attr('opacity', 0.8);
          });
        }
      }

      updateSyncNodeCPU(nodeIndex, percent) {
        const layout = this.getLayout();
        const count = this.config.get('syncNodeCount');
        const cpuBarWidth = this.getSyncCpuBarWidth();
        const cpuBarGap = 6;
        const boxWidth = layout.syncNodes.width - cpuBarWidth - cpuBarGap;
        const nodeHeight = (layout.syncNodes.height - (count - 1) * 20) / count;
        const y = layout.syncNodes.y + nodeIndex * (nodeHeight + 20);
        const barX = layout.syncNodes.x + boxWidth + cpuBarGap;
        const barHeight = Math.max(16, (nodeHeight - 16) / 2);
        const barPad = (nodeHeight - barHeight) / 2;

        const fillHeight = (barHeight - 2) * (percent / 100);
        // Note: using attr('fill') not style('fill') so CSS .gauge-bottleneck can override via !important
        const color = percent < 50 ? '#22c55e' : percent < 80 ? '#eab308' : '#ef4444';

        this.dbLayer.selectAll('.sync-node-fill')
          .filter(function() { return +d3.select(this).attr('data-sync-node-fill') === nodeIndex; })
          .attr('x', barX + 1)
          .attr('width', cpuBarWidth - 2)
          .attr('y', y + barPad + barHeight - fillHeight)
          .attr('height', fillHeight)
          .attr('fill', color);

        this.labelLayer.selectAll('.sync-node-cpu')
          .filter(function() { return +d3.select(this).attr('data-sync-cpu-text') === nodeIndex; })
          .text(Math.round(percent) + '%');
      }

      updateBottleneckIndicators(bottlenecks) {
        const dbBlocks = this.dbLayer.selectAll('.db-block');
        const layout = this.getLayout();

        dbBlocks.each(function(d, i) {
          const el = d3.select(this);
          const isSource = Math.abs(+el.attr('x') - layout.source.x) < 1;
          const isTarget = Math.abs(+el.attr('x') - layout.target.x) < 1;

          const isBottleneck = (isSource && bottlenecks.includes('source')) ||
                               (isTarget && bottlenecks.includes('target'));

          el.classed('bottleneck-glow', isBottleneck);
        });

        // Gauge fills
        this.dbLayer.select('.gauge-source')
          .classed('gauge-bottleneck', bottlenecks.includes('source'));
        this.dbLayer.select('.gauge-target')
          .classed('gauge-bottleneck', bottlenecks.includes('target'));

        // Sync node rects
        const syncBottleneck = bottlenecks.includes('sync');
        this.dbLayer.selectAll('.sync-node-rect')
          .classed('bottleneck-glow', syncBottleneck);

        // Sync node CPU bar fills
        this.dbLayer.selectAll('.sync-node-fill')
          .classed('gauge-bottleneck', syncBottleneck);
      }

      highlightPartitions(partitionIndices, active) {
        this.dbLayer.selectAll('.partition-rect').each(function() {
          const idx = parseInt(d3.select(this).attr('data-partition'));
          if (partitionIndices.includes(idx)) {
            d3.select(this)
              .classed('partition-active', active)
              .attr('stroke-opacity', active ? 0.8 : 0.3);
          }
        });
      }

      resetHighlights() {
        this.dbLayer.selectAll('.partition-rect')
          .classed('partition-active', false)
          .attr('stroke-opacity', 0.3);
      }

      resetDrains() {
        this.resetSourceViz();
        this.updateBottleneckIndicators([]);
      }

      resetTargetFill() {
        this.dbLayer.selectAll('.target-fill').remove();
      }

      resetTargetViz() {
        this.targetVizLayer.selectAll('*').remove();
        this.targetCells = [];
        this.targetCellGrid = null;
      }

      _buildTargetGrid(streamCount) {
        const layout = this.getLayout();
        const tgt = layout.target;
        const pad = 4;
        const areaW = tgt.width - pad * 2;
        const areaH = tgt.height - pad * 2;

        const cellSize = 4;
        const gap = 1;
        const step = cellSize + gap;

        const cols = Math.max(1, Math.floor(areaW / step));
        const rows = Math.max(1, Math.floor(areaH / step));
        const totalCells = cols * rows;

        // Center the grid
        const gridW = cols * step - gap;
        const gridH = rows * step - gap;
        const offsetX = tgt.x + pad + (areaW - gridW) / 2;
        const offsetY = tgt.y + pad + (areaH - gridH) / 2;

        const grid = { cols, rows, totalCells, cellSize, step, offsetX, offsetY };
        this.targetCellGrid = grid;

        // Build cell assignment order based on targetDistribution
        const dist = this.config.get('targetDistribution');
        const cellsPerStream = Math.ceil(totalCells / streamCount);
        const cellOrder = [];

        if (dist === 'stacked') {
          // Each stream gets a horizontal band, fills bottom-to-top within band
          const rowsPerStream = Math.ceil(rows / streamCount);
          for (let c = 0; c < streamCount; c++) {
            const startRow = c * rowsPerStream;
            const endRow = Math.min((c + 1) * rowsPerStream, rows);
            for (let r = endRow - 1; r >= startRow; r--) {
              for (let col = 0; col < cols; col++) {
                cellOrder.push({ row: r, col, streamId: c, idx: r * cols + col });
              }
            }
          }
        } else if (dist === 'interleaved') {
          // Rows alternate between streams, fills bottom-to-top
          for (let r = rows - 1; r >= 0; r--) {
            const c = r % streamCount;
            for (let col = 0; col < cols; col++) {
              cellOrder.push({ row: r, col, streamId: c, idx: r * cols + col });
            }
          }
        } else {
          // Scattered: random assignment
          const indices = [];
          for (let r = 0; r < rows; r++) {
            for (let col = 0; col < cols; col++) {
              indices.push({ row: r, col, idx: r * cols + col });
            }
          }
          // Shuffle
          for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
          }
          // Assign streams round-robin through shuffled positions
          indices.forEach((cell, i) => {
            cellOrder.push({ ...cell, streamId: i % streamCount });
          });
        }

        // Group by stream for easy lookup
        this.targetCells = cellOrder;
        return grid;
      }

      updateTargetViz(streams, themeName) {
        const streamCount = streams.length;
        const colors = this.themes.themes[themeName]['--stream-colors'];
        const tableSize = this.config.get('tableSize');

        // Rebuild grid if needed (layout or config changed)
        if (!this.targetCellGrid) {
          this._buildTargetGrid(streamCount);
        }

        const grid = this.targetCellGrid;

        // Calculate how many cells each stream should have filled
        const perStreamCells = {};
        for (let c = 0; c < streamCount; c++) {
          const streamRecords = streams[c].recordsProcessed;
          const streamTotal = streams[c].range.size || Math.ceil(tableSize / streamCount);
          const streamFrac = Math.min(1, streamRecords / streamTotal);
          const cellsForStream = this.targetCells.filter(cell => cell.streamId === c).length;
          perStreamCells[c] = Math.floor(streamFrac * cellsForStream);
        }

        // Collect which cells to show
        const cellsToShow = [];
        const streamCounts = {};
        for (let c = 0; c < streamCount; c++) streamCounts[c] = 0;

        this.targetCells.forEach(cell => {
          if (streamCounts[cell.streamId] < perStreamCells[cell.streamId]) {
            cellsToShow.push(cell);
            streamCounts[cell.streamId]++;
          }
        });

        // Efficient update: use D3 data join
        const layer = this.targetVizLayer;
        const rects = layer.selectAll('rect').data(cellsToShow, d => d.idx);
        rects.exit().remove();
        rects.enter().append('rect')
          .attr('x', d => grid.offsetX + d.col * grid.step)
          .attr('y', d => grid.offsetY + d.row * grid.step)
          .attr('width', grid.cellSize)
          .attr('height', grid.cellSize)
          .attr('fill', d => colors[d.streamId % 16])
          .attr('fill-opacity', 0.7)
          .attr('rx', 1).attr('ry', 1);
      }

      resetGauges() {
        ['source', 'target'].forEach(prefix => { this.updateGauge(prefix, 0); });
      }

      resetSyncNodes() {
        const count = this.config.get('syncNodeCount');
        for (let i = 0; i < count; i++) { this.updateSyncNodeCPU(i, 0); }
      }

      getStreamSourceY(streamIndex, streamCount, sourceRect) {
        const partCount = this.config.get('partitionCount');
        if (streamCount === partCount) {
          // Aligned: position at center of each partition
          const fractions = this.config._getPartitionHeights();
          const gap = 3;
          const totalH = sourceRect.height - gap * 2 * partCount;
          let cursor = sourceRect.y;
          for (let i = 0; i < partCount; i++) {
            const partH = totalH * fractions[i];
            if (i === streamIndex) {
              return cursor + gap + partH / 2;
            }
            cursor += partH + gap * 2;
          }
        }
        // Not aligned: equal spacing
        return sourceRect.y + (sourceRect.height / (streamCount + 1)) * (streamIndex + 1);
      }

      drawConnections(streams, themeName) {
        this.connectionLayer.selectAll('*').remove();
        const layout = this.getLayout();
        const colors = this.themes.themes[themeName]['--stream-colors'];
        const streamCount = streams.length;
        const nodeAssignment = this.config.getNodeAssignment();
        const nodeCount = this.config.get('syncNodeCount');
        const nodeHeight = (layout.syncNodes.height - (nodeCount - 1) * 20) / nodeCount;

        streams.forEach((stream, i) => {
          const nodeIdx = Math.max(0, nodeAssignment.findIndex(arr => arr.includes(i)));
          const nodeY = layout.syncNodes.y + nodeIdx * (nodeHeight + 20) + nodeHeight / 2;

          // Stage 1: Source -> Sync Node
          const startX1 = layout.sourceGauges.x + layout.sourceGauges.width * 2 + 12;
          const endX1 = layout.syncNodes.x;
          const yStart = this.getStreamSourceY(i, streamCount, layout.source);

          const opacity = stream.state === 'idle' ? 0.1 : stream.state === 'complete' ? 0.2 : 0.5;

          this.connectionLayer.append('line')
            .attr('x1', startX1).attr('y1', yStart)
            .attr('x2', endX1).attr('y2', nodeY)
            .attr('stroke', colors[i % 16])
            .attr('stroke-width', 1.5).attr('stroke-opacity', opacity)
            .attr('data-stream', i).attr('data-stage', 'left');

          const mid1X = (startX1 + endX1) / 2;
          const mid1Y = (yStart + nodeY) / 2;
          this.connectionLayer.append('text')
            .attr('x', mid1X).attr('y', mid1Y - 6)
            .attr('text-anchor', 'middle').attr('font-size', '10px')
            .attr('fill', colors[i % 16])
            .text(`${Labels.streamAbbr()}${i + 1}`);

          // Stage 2: Sync Node -> Target
          const startX2 = layout.syncNodes.x + layout.syncNodes.width;
          const endX2 = layout.targetGauges.x - 4;
          const yEnd = layout.target.y + layout.target.height / 2;

          this.connectionLayer.append('line')
            .attr('x1', startX2).attr('y1', nodeY)
            .attr('x2', endX2).attr('y2', yEnd)
            .attr('stroke', colors[i % 16])
            .attr('stroke-width', 1.5).attr('stroke-opacity', opacity)
            .attr('data-stream', i).attr('data-stage', 'right');
        });
      }

    }

    // ── StreamManager ────────────────────────────────────────────────────
    class StreamManager {
      constructor(bus, config) {
        this.bus = bus;
        this.config = config;
        this.streams = [];
        this.reset();
      }

      reset() {
        const cfg = this.config.getAll();
        const ranges = this.config.getStreamRanges();
        const nodeAssignment = this.config.getNodeAssignment();

        this.streams = ranges.map((range, i) => ({
          id: i,
          state: 'idle',
          progress: 0,
          scanProgress: 0,
          transferProgress: 0,
          recordsProcessed: 0,
          range,
          partitionsScanned: this.getPartitionsForStream(i, cfg),
          nodeIndex: Math.max(0, nodeAssignment.findIndex(arr => arr.includes(i))),
        }));
        this.bus.emit('streams-reset', this.streams);
      }

      getPartitionsForStream(streamIndex, cfg) {
        const { streamCount, partitionCount } = cfg;
        if (streamCount === partitionCount) {
          return [streamIndex % partitionCount];
        }
        return Array.from({ length: partitionCount }, (_, i) => i);
      }

      tick(deltaTime) {
        const throughputInfo = this.config.getEffectiveThroughput();
        let allComplete = true;

        this.streams.forEach((stream, i) => {
          if (stream.state === 'complete') return;
          allComplete = false;

          const streamRecords = stream.range.size || this.config.get('tableSize');
          const effectiveThroughput = throughputInfo.perStream[i] ?? throughputInfo.perStream[0] ?? 1000;

          if (stream.state === 'idle') {
            stream.state = 'active';
          }

          if (stream.state === 'active') {
            const records = deltaTime * effectiveThroughput;
            stream.progress += records / streamRecords;
            stream.recordsProcessed = Math.min(streamRecords, Math.floor(stream.progress * streamRecords));
            // Derive scan/transfer progress for visual compatibility
            stream.scanProgress = Math.min(1, stream.progress * 1.2);  // scan leads slightly
            stream.transferProgress = stream.progress;
            if (stream.progress >= 1) {
              stream.progress = 1;
              stream.scanProgress = 1;
              stream.transferProgress = 1;
              stream.recordsProcessed = streamRecords;
              stream.state = 'complete';
            }
          }
        });

        this.bus.emit('streams-updated', this.streams);
        return allComplete;
      }

      reconfigure() {
        const cfg = this.config.getAll();
        const ranges = this.config.getStreamRanges();
        const nodeAssignment = this.config.getNodeAssignment();
        const totalProcessed = this.getTotalRecordsProcessed();
        const overallProgress = cfg.tableSize > 0 ? Math.min(1, totalProcessed / cfg.tableSize) : 0;

        this.streams = ranges.map((range, i) => {
          const streamRecords = range.size || cfg.tableSize;
          const streamProgress = Math.min(1, overallProgress);
          return {
            id: i,
            state: streamProgress >= 1 ? 'complete' : (totalProcessed > 0 ? 'active' : 'idle'),
            progress: streamProgress,
            scanProgress: Math.min(1, streamProgress * 1.2),
            transferProgress: streamProgress,
            recordsProcessed: Math.min(streamRecords, Math.floor(streamProgress * streamRecords)),
            range,
            partitionsScanned: this.getPartitionsForStream(i, cfg),
            nodeIndex: Math.max(0, nodeAssignment.findIndex(arr => arr.includes(i))),
          };
        });
        this.bus.emit('streams-reset', this.streams);
        this.bus.emit('streams-updated', this.streams);
      }

      getTotalRecordsProcessed() {
        return this.streams.reduce((sum, c) => sum + c.recordsProcessed, 0);
      }

      getActiveStreamCount() {
        return this.streams.filter(c => c.state === 'active').length;
      }

      getCompletedStreamCount() {
        return this.streams.filter(c => c.state === 'complete').length;
      }
    }

    // ── AnimationController ──────────────────────────────────────────────
    class AnimationController {
      constructor(bus, config, streamMgr, dbRenderer) {
        this.bus = bus;
        this.config = config;
        this.streamMgr = streamMgr;
        this.dbRenderer = dbRenderer;
        this.running = false;
        this.lastTime = null;
        this.elapsedTime = 0;
        this.animFrameId = null;

        this.bus.on('animation-play', () => this.play());
        this.bus.on('animation-pause', () => this.pause());
        this.bus.on('animation-reset', () => this.reset());
        this.bus.on('animation-step', () => this.step());
        this.bus.on('config-changed', ({ key }) => {
          // Theme and speed don't affect simulation state
          if (['theme', 'animationSpeed', 'targetDistribution'].includes(key)) return;
          // Live reconfigure: reset streams to reflect new config, keep flowing
          this.streamMgr.reset();
          this.elapsedTime = 0;
          this.bus.emit('time-update', 0);
        });
      }

      play() {
        if (this.running) return;
        this.running = true;
        this.lastTime = performance.now();
        this.loop();
        this.bus.emit('animation-state', 'playing');
      }

      pause() {
        this.running = false;
        if (this.animFrameId) cancelAnimationFrame(this.animFrameId);
        this.animFrameId = null;
        this.bus.emit('animation-state', 'paused');
      }

      reset() {
        this.pause();
        this.elapsedTime = 0;
        this.lastTime = null;
        this.streamMgr.reset();
        this.dbRenderer.resetHighlights();
        this.dbRenderer.resetDrains();
        this.dbRenderer.resetTargetFill();
        this.dbRenderer.resetTargetViz();
        this.dbRenderer.resetGauges();
        this.dbRenderer.resetSyncNodes();
        this.bus.emit('animation-state', 'idle');
        this.bus.emit('time-update', 0);
      }

      step() {
        const speed = this.config.get('animationSpeed');
        this.elapsedTime += 0.5;
        const allDone = this.streamMgr.tick(0.5);
        this.updateVisuals();
        this.bus.emit('time-update', this.elapsedTime);
        if (allDone) {
          this.bus.emit('animation-state', 'complete');
        }
      }

      loop() {
        if (!this.running) return;
        const now = performance.now();
        const rawDelta = (now - this.lastTime) / 1000;
        this.lastTime = now;

        const speed = this.config.get('animationSpeed');
        const simDelta = rawDelta * speed;
        this.elapsedTime += simDelta;

        const allDone = this.streamMgr.tick(simDelta);
        this.updateVisuals();
        this.bus.emit('time-update', this.elapsedTime);

        if (allDone) {
          this.updateVisuals();
          this.pause();
          this.bus.emit('animation-state', 'complete');
        }

        this.animFrameId = requestAnimationFrame(() => this.loop());
      }

      updateVisuals() {
        this.dbRenderer.resetHighlights();
        const streams = this.streamMgr.streams;
        const themeName = this.config.get('theme');
        const cfg = this.config.getAll();
        const throughputInfo = this.config.getEffectiveThroughput();

        // Highlight active partitions
        streams.forEach(stream => {
          if (stream.state === 'active') {
            this.dbRenderer.highlightPartitions(stream.partitionsScanned, true);
          }
        });

        // Drain source partitions based on scan progress (pixel grid)
        const partCount = cfg.partitionCount;
        const partDrain = new Array(partCount).fill(0);
        streams.forEach(stream => {
          const drainProgress = stream.scanProgress;
          stream.partitionsScanned.forEach(pi => {
            partDrain[pi] = Math.max(partDrain[pi], drainProgress);
          });
        });
        this.dbRenderer.updateSourceViz(partDrain, themeName);

        // Fill target with colored pixels per stream
        this.dbRenderer.updateTargetViz(streams, themeName);

        // Update gauges - scale down as streams finish
        const activeCount = streams.filter(c => c.state === 'active').length;
        const activeFraction = cfg.streamCount > 0 ? activeCount / cfg.streamCount : 0;
        this.dbRenderer.updateGauge('source', throughputInfo.sourceUtil * activeFraction);
        this.dbRenderer.updateGauge('target', throughputInfo.targetUtil * activeFraction);

        // Update sync node CPU fills
        throughputInfo.perNodeUtil.forEach((util, i) => {
          this.dbRenderer.updateSyncNodeCPU(i, util * activeFraction);
        });

        // Bottleneck visual indicators
        if (activeCount > 0) {
          this.dbRenderer.updateBottleneckIndicators(throughputInfo.bottlenecks);
        } else {
          this.dbRenderer.updateBottleneckIndicators([]);
        }

        // Draw connections
        this.dbRenderer.drawConnections(streams, themeName);
      }
    }

    class ParticleSystem {
      constructor(bus, config, themes, dbRenderer) {
        this.bus = bus;
        this.config = config;
        this.themes = themes;
        this.dbRenderer = dbRenderer;
        this.particles = [];
        this.maxParticlesPerStream = 40;

        this.bus.on('streams-updated', streams => this.update(streams));
        this.bus.on('streams-reset', () => this.clear());
        this.bus.on('animation-state', state => {
          if (state === 'idle' || state === 'complete') this.clear();
        });
      }

      update(streams) {
        const layout = this.dbRenderer.getLayout();
        const themeName = this.config.get('theme');
        const colors = this.themes.themes[themeName]['--stream-colors'];
        const layer = this.dbRenderer.particleLayer;
        const streamCount = streams.length;
        const nodeAssignment = this.config.getNodeAssignment();
        const nodeCount = this.config.get('syncNodeCount');
        const throughputInfo = this.config.getEffectiveThroughput();
        const maxThroughput = Math.max(...throughputInfo.perStream, 1);
        const nodeHeight = (layout.syncNodes.height - (nodeCount - 1) * 20) / nodeCount;
        streams.forEach((stream, i) => {
          if (stream.state !== 'active') {
            this.particles = this.particles.filter(p => {
              if (p.streamId === i) { if (p.el) p.el.remove(); return false; }
              return true;
            });
            return;
          }

          const nodeIdx = nodeAssignment.findIndex(arr => arr.includes(i));
          const nodeY = layout.syncNodes.y + Math.max(0, nodeIdx) * (nodeHeight + 20) + nodeHeight / 2;
          const yStart = this.dbRenderer.getStreamSourceY(i, streamCount, layout.source);

          const streamThroughput = throughputInfo.perStream[i] || 1;
          const absoluteScale = Math.min(100, Math.max(0.5, 1 + 99 * (streamThroughput - 5000) / 95000));
          const relativeScale = Math.max(0.3, streamThroughput / maxThroughput);
          const particleScale = absoluteScale * relativeScale;
          const maxForThisStream = Math.ceil((this.maxParticlesPerStream / 2) * particleScale);

          // Stage 1 particles: Source -> Sync Node
          const existing1 = this.particles.filter(p => p.streamId === i && p.stage === 1).length;
          if (existing1 < maxForThisStream) {
            const startX = layout.sourceGauges.x + layout.sourceGauges.width * 2 + 12;
            const endX = layout.syncNodes.x;
            this.particles.push({
              streamId: i, stage: 1, t: Math.random() * 0.3,
              baseSpeed: 0.012 + Math.random() * 0.008,
              yOffset: (Math.random() - 0.5) * 8 * Math.sqrt(absoluteScale),
              startX, startY: yStart, endX, endY: nodeY,
              el: layer.append('circle')
                .attr('class', 'particle')
                .attr('r', 2 + Math.random() * 1.5)
                .attr('fill', colors[i % 16]).attr('opacity', 0)
            });
          }

          // Stage 2 particles: Sync Node -> Target
          const existing2 = this.particles.filter(p => p.streamId === i && p.stage === 2).length;
          if (existing2 < maxForThisStream) {
            const startX2 = layout.syncNodes.x + layout.syncNodes.width;
            const endX2 = layout.targetGauges.x - 4;
            const endY2 = layout.target.y + layout.target.height / 2;
            this.particles.push({
              streamId: i, stage: 2, t: Math.random() * 0.3,
              baseSpeed: 0.012 + Math.random() * 0.008,
              yOffset: (Math.random() - 0.5) * 8 * Math.sqrt(absoluteScale),
              startX: startX2, startY: nodeY, endX: endX2, endY: endY2,
              el: layer.append('circle')
                .attr('class', 'particle')
                .attr('r', 2 + Math.random() * 1.5)
                .attr('fill', colors[i % 16]).attr('opacity', 0)
            });
          }
        });

        // Move all particles — speed scales with animationSpeed
        const speedScale = Math.max(1, Math.sqrt(Math.min(this.config.get('animationSpeed'), 20)));
        this.particles = this.particles.filter(p => {
          p.t += p.baseSpeed * speedScale;
          if (p.t >= 1) { if (p.el) p.el.remove(); return false; }

          const x = p.startX + (p.endX - p.startX) * p.t;
          const y = p.startY + (p.endY - p.startY) * p.t;
          const wave = Math.sin(p.t * Math.PI * 2) * (2 + speedScale * 2);
          p.el.attr('cx', x).attr('cy', y + wave + p.yOffset);
          p.el.attr('opacity', p.t < 0.1 ? p.t * 8 : p.t > 0.9 ? (1 - p.t) * 8 : 0.7);
          return true;
        });
      }

      clear() {
        this.particles.forEach(p => { if (p.el) p.el.remove(); });
        this.particles = [];
      }
    }

    class MetricsDashboard {
      constructor(bus, config, streamMgr) {
        this.bus = bus;
        this.config = config;
        this.streamMgr = streamMgr;
        this.container = document.getElementById('metrics-dashboard');
        this.elapsedTime = 0;
        this.render();
        this.bus.on('streams-updated', () => this.update());
        this.bus.on('time-update', t => { this.elapsedTime = t; this.update(); });
        this.bus.on('animation-state', state => {
          if (state === 'idle') { this.elapsedTime = 0; this.update(); }
        });
      }

      render() {
        this.container.innerHTML = `
          <div class="metric-card">
            <span class="metric-value" id="metric-time">00:00.0</span>
            <span class="metric-label">Time Elapsed</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" id="metric-records">0 / 0</span>
            <span class="metric-label">Records Processed</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" id="metric-throughput">0</span>
            <span class="metric-label">Total Throughput (rec/s)</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" id="metric-active">0 / 0</span>
            <span class="metric-label">Active ${Labels.stream}s</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" id="metric-speedup">1.0x</span>
            <span class="metric-label">Speedup vs Default</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" id="metric-total-time">--</span>
            <span class="metric-label">Est. Total Time</span>
          </div>
          <div class="metric-card" style="min-width: 260px;">
            <span class="metric-value" id="metric-bottleneck" style="font-size:11px; white-space: nowrap;">--</span>
            <span class="metric-label">Utilization</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" id="metric-eff-throughput">0</span>
            <span class="metric-label">Effective Throughput</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" id="metric-per-node" style="font-size:13px;">--</span>
            <span class="metric-label">Per-Node Throughput</span>
          </div>
        `;
      }

      update() {
        const cfg = this.config.getAll();
        const processed = this.streamMgr.getTotalRecordsProcessed();
        const active = this.streamMgr.getActiveStreamCount();
        const totalStreams = this.streamMgr.streams.length;
        const throughputInfo = this.config.getEffectiveThroughput();
        const activeFraction = totalStreams > 0 ? active / totalStreams : 0;
        const currentThroughput = throughputInfo.total * activeFraction;

        const mins = Math.floor(this.elapsedTime / 60);
        const secs = (this.elapsedTime % 60).toFixed(1);
        document.getElementById('metric-time').textContent =
          `${String(mins).padStart(2, '0')}:${secs.padStart(4, '0')}`;

        document.getElementById('metric-records').textContent =
          `${formatNum(processed)} / ${formatNum(cfg.tableSize)}`;

        document.getElementById('metric-throughput').textContent =
          formatNum(currentThroughput);

        document.getElementById('metric-active').textContent =
          `${active} / ${totalStreams}`;

        // Speedup: compare effective vs single-stream default
        const defaultThroughput = Math.min(cfg.sourceACU * 2000, cfg.targetACU * 2000, cfg.throughputPerStream);
        const speedup = throughputInfo.total / defaultThroughput;
        document.getElementById('metric-speedup').textContent =
          speedup.toFixed(1) + 'x';

        // Est total time based on effective throughput
        const estSeconds = cfg.tableSize / Math.max(1, throughputInfo.total);
        document.getElementById('metric-total-time').textContent =
          this._formatTime(estSeconds);

        // Resource utilization breakdown
        const parts = [];
        const bottleneckColor = '#ef4444';
        const normalColor = 'var(--accent-primary)';

        const addPart = (label, util, isBottleneck) => {
          const color = isBottleneck ? bottleneckColor : normalColor;
          parts.push(`<span style="color:${color}">${label}: ${Math.round(util)}%</span>`);
        };

        if (active > 0) {
          addPart('Src', throughputInfo.sourceUtil, throughputInfo.bottlenecks.includes('source'));
          addPart('Sync', throughputInfo.syncUtil, throughputInfo.bottlenecks.includes('sync'));
          addPart('Tgt', throughputInfo.targetUtil, throughputInfo.bottlenecks.includes('target'));
          document.getElementById('metric-bottleneck').innerHTML = parts.join(' · ');
        } else {
          document.getElementById('metric-bottleneck').textContent = '--';
        }

        // Effective throughput
        document.getElementById('metric-eff-throughput').textContent =
          formatNum(throughputInfo.total) + '/s';

        // Per-node throughput
        const nodeAssignment = this.config.getNodeAssignment();
        const perNodeStr = throughputInfo.perNodeUtil.map((util, i) => {
          const nodeStreams = nodeAssignment[i] || [];
          const nodeThroughput = nodeStreams.reduce((s, ci) => s + (throughputInfo.perStream[ci] || 0), 0);
          return `${Labels.node[0]}${i + 1}: ${formatNum(nodeThroughput)}`;
        }).join(' | ');
        document.getElementById('metric-per-node').textContent = perNodeStr || '--';
      }

      _formatTime(seconds) {
        if (seconds >= 86400) return (seconds / 86400).toFixed(1) + 'd';
        if (seconds >= 3600) {
          const h = Math.floor(seconds / 3600);
          const m = Math.floor((seconds % 3600) / 60);
          return `${h}h ${m}m`;
        }
        if (seconds >= 60) {
          const m = Math.floor(seconds / 60);
          const s = Math.floor(seconds % 60);
          return `${m}m ${s}s`;
        }
        return seconds.toFixed(1) + 's';
      }
    }

    class ThroughputChart {
      constructor(bus, config, streamMgr) {
        this.bus = bus;
        this.config = config;
        this.streamMgr = streamMgr;
        this.data = [];
        this.lastRenderTime = 0;
        this.startWallTime = null;
        this.margin = { top: 12, right: 20, bottom: 28, left: 55 };

        const container = document.getElementById('throughput-chart');
        this.svg = d3.select('#chart-svg');
        this.chartG = this.svg.append('g')
          .attr('transform', `translate(${this.margin.left},${this.margin.top})`);

        this.gridG = this.chartG.append('g').attr('class', 'grid');
        this.xAxisG = this.chartG.append('g').attr('class', 'axis x-axis');
        this.yAxisG = this.chartG.append('g').attr('class', 'axis y-axis');
        this.linePath = this.chartG.append('path').attr('class', 'chart-line');
        this.chartG.append('text')
          .attr('class', 'chart-label')
          .attr('x', 4).attr('y', -2)
          .text('Throughput (rec/s)');

        this.bus.on('time-update', () => this.onTick());
        this.bus.on('animation-state', (state) => {
          if (state === 'idle') {
            this.data = [];
            this.startWallTime = null;
            this.render();
          }
        });

        window.addEventListener('resize', () => this.render());
      }

      onTick() {
        const now = performance.now() / 1000;
        if (!this.startWallTime) this.startWallTime = now;
        const t = now - this.startWallTime;

        const activeCount = this.streamMgr.getActiveStreamCount();
        const totalStreams = this.config.get('streamCount');
        const throughputInfo = this.config.getEffectiveThroughput();
        const activeFraction = totalStreams > 0 ? activeCount / totalStreams : 0;
        const value = throughputInfo.total * activeFraction;

        // Skip zero points after non-zero to avoid dips during config resets
        const last = this.data[this.data.length - 1];
        if (value === 0 && last && last.value > 0) return;

        this.data.push({ time: t, value });

        // Throttle rendering to ~10fps
        if (now * 1000 - this.lastRenderTime < 100) return;
        this.lastRenderTime = now * 1000;
        this.render();
      }

      render() {
        if (this.data.length < 2) return;

        const el = document.getElementById('throughput-chart');
        const w = el.clientWidth - this.margin.left - this.margin.right;
        const h = el.clientHeight - this.margin.top - this.margin.bottom;
        if (w <= 0 || h <= 0) return;

        const xScale = d3.scaleLinear()
          .domain([0, d3.max(this.data, d => d.time) || 1])
          .range([0, w]);

        const yMax = d3.max(this.data, d => d.value) || 1;
        const yScale = d3.scaleLinear()
          .domain([0, yMax * 1.1])
          .range([h, 0]);

        // Grid
        this.gridG.call(d3.axisLeft(yScale).ticks(4).tickSize(-w).tickFormat(''))
          .attr('transform', `translate(0,0)`);

        // Axes
        this.xAxisG
          .attr('transform', `translate(0,${h})`)
          .call(d3.axisBottom(xScale).ticks(6).tickFormat(d => {
            if (d >= 60) return Math.floor(d / 60) + 'm' + (d % 60 ? Math.floor(d % 60) + 's' : '');
            return d.toFixed(0) + 's';
          }));

        this.yAxisG.call(d3.axisLeft(yScale).ticks(4).tickFormat(d => {
          if (d >= 1000) return (d / 1000).toFixed(0) + 'K';
          return d.toFixed(0);
        }));

        // Line
        const line = d3.line()
          .x(d => xScale(d.time))
          .y(d => yScale(d.value));

        this.linePath.attr('d', line(this.data));
      }
    }

    // ── Initialization ───────────────────────────────────────────────────
    const bus = new EventBus();
    const config = new ConfigurationManager(bus);
    const themes = new ThemeManager(bus);
    themes.apply(config.get('theme'));
    const panel = new ConfigPanel(bus, config);
    const dbRenderer = new DatabaseRenderer(bus, config, themes);
    const streamMgr = new StreamManager(bus, config);
    const animController = new AnimationController(bus, config, streamMgr, dbRenderer);
    const particleSys = new ParticleSystem(bus, config, themes, dbRenderer);
    const dashboard = new MetricsDashboard(bus, config, streamMgr);
    const throughputChart = new ThroughputChart(bus, config, streamMgr);

    // Playback button state updates
    bus.on('animation-state', state => {
      document.getElementById('play-btn').classList.toggle('playing', state === 'playing');
    });

    // Initial connection draw
    bus.on('streams-reset', streams => {
      dbRenderer.drawConnections(streams, config.get('theme'));
    });

    // Draw initial state
    dbRenderer.drawConnections(streamMgr.streams, config.get('theme'));

    // Auto-play: start the constant flow immediately
    bus.emit('animation-play');

    window._app = { bus, config, themes, panel, dbRenderer, streamMgr, animController, particleSys, dashboard };
  </script>
</body>
