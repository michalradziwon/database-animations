<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Sync Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-panel: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --accent-primary: #2563eb;
      --accent-secondary: #3b82f6;
      --accent-success: #22c55e;
      --accent-warning: #f59e0b;
      --accent-danger: #ef4444;

      --glow-scan: rgba(234, 179, 8, 0.6);
      --glow-transfer: rgba(59, 130, 246, 0.6);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', monospace;
    }

    body { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s, color 0.3s; }
    #config-panel { background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 12px 20px; flex-shrink: 0; }
    #visualization { flex: 1; min-height: 0; position: relative; }
    #main-svg { width: 100%; height: 100%; }
    #throughput-chart { background: var(--bg-panel); border-top: 1px solid var(--border); height: 150px; flex-shrink: 0; position: relative; }
    #throughput-chart svg { width: 100%; height: 100%; }
    #throughput-chart .chart-line { fill: none; stroke: var(--accent-primary); stroke-width: 1.5; }
    #throughput-chart .grid line { stroke: var(--border); stroke-opacity: 0.5; }
    #throughput-chart .grid .domain { stroke: none; }
    #throughput-chart .axis { color: var(--text-secondary); font-size: 10px; }
    #throughput-chart .chart-label { fill: var(--text-secondary); font-size: 11px; font-weight: 600; }
    #metrics-dashboard { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 8px 20px; flex-shrink: 0; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .config-row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
    .config-row:last-child { margin-bottom: 0; }
    .config-group { display: flex; align-items: center; gap: 6px; }
    .config-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
    .config-separator { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
    .config-slider { width: 120px; accent-color: var(--accent-primary); }
    .config-input { width: 80px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: var(--bg-primary); color: var(--text-primary); }
    .config-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: var(--bg-primary); color: var(--text-primary); }
    .config-checkbox { accent-color: var(--accent-primary); }
    .alignment-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .alignment-badge.aligned { background: #dcfce7; color: #166534; }
    .alignment-badge.misaligned { background: #fef3c7; color: #92400e; }
    .smart-btn { padding: 4px 12px; border: 1px solid var(--accent-primary); background: transparent; color: var(--accent-primary); border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .smart-btn:hover { background: var(--accent-primary); color: white; }
    .playback-btn { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); border-radius: 4px; font-size: 14px; cursor: pointer; transition: all 0.15s; }
    .playback-btn:hover { background: var(--accent-secondary); color: white; }
    .playback-btn.playing { background: var(--accent-primary); color: white; }
    .slider-value { font-size: 12px; font-weight: 600; color: var(--accent-primary); min-width: 28px; text-align: center; }
    .db-block { stroke-width: 2; rx: 8; ry: 8; }
    .db-label { font-size: 16px; font-weight: 700; text-anchor: middle; }
    .db-sublabel { font-size: 11px; text-anchor: middle; fill: var(--text-secondary); }
    .partition-rect { stroke-width: 1; }
    .partition-label { font-size: 10px; text-anchor: middle; fill: var(--text-secondary); }
    .particle { pointer-events: none; }
    .metric-card { display: flex; flex-direction: column; align-items: center; padding: 4px 10px; background: var(--bg-primary); border-radius: 6px; border: 1px solid var(--border); min-width: 100px; }
    .metric-value { font-size: 16px; font-weight: 700; color: var(--accent-primary); font-family: var(--font-mono); }
    .metric-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .duration-btn { padding: 4px 10px; border: 1px solid var(--accent-primary); background: transparent; color: var(--accent-primary); border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .duration-btn:hover { background: var(--accent-primary); color: white; }
    .duration-btn.active { background: var(--accent-primary); color: white; }
    .distribution-btn { padding: 4px 10px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .distribution-btn:first-child { border-radius: 4px 0 0 4px; }
    .distribution-btn:not(:first-child):not(:last-child) { border-radius: 0; }
    .distribution-btn:last-child { border-radius: 0 4px 4px 0; }
    .distribution-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .gauge-bar-bg { fill: var(--bg-secondary); stroke: var(--border); stroke-width: 1; rx: 2; }
    .gauge-bar-fill { rx: 2; transition: height 0.1s; }
    .gauge-label { font-size: 9px; text-anchor: middle; fill: var(--text-secondary); }
    .gauge-value { font-size: 8px; text-anchor: middle; font-weight: 600; }
    .sync-node-rect { stroke-width: 2; rx: 6; ry: 6; }
    .sync-node-label { font-size: 11px; font-weight: 600; text-anchor: middle; }
    .sync-node-cpu { font-size: 10px; font-weight: 700; }
    .partition-fill { }
    .target-fill { transition: height 0.1s; }
    .export-option:hover { background: var(--accent-primary); color: white; }

    @keyframes bottleneck-pulse {
      0%, 100% { stroke-opacity: 0.4; }
      50% { stroke-opacity: 0.9; }
    }
    .bottleneck-glow {
      stroke: #ef4444 !important;
      stroke-width: 6 !important;
      filter: url(#bottleneck-glow-filter);
      animation: bottleneck-pulse 1.5s ease-in-out infinite;
    }
    .gauge-bottleneck {
      fill: #ef4444 !important;
    }
  </style>
</head>
<body>
  <div id="config-panel"></div>
  <div id="visualization">
    <svg id="main-svg"></svg>
  </div>
  <div id="throughput-chart"><svg id="chart-svg"></svg></div>
  <div id="metrics-dashboard"></div>
  <div id="version-bar" style="position:fixed; bottom:0; left:50%; transform:translateX(-50%); font-size:9px; color:var(--text-secondary); opacity:0.4; pointer-events:none;">v2026.02.25</div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    // ── Shared utility ──────────────────────────────────────────────────
    function formatNum(n) {
      if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(1) + 'B';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
      return Math.round(n).toString();
    }

    // ── Labels (URL-parameterized) ─────────────────────────────────────────
    const Labels = (() => {
      const params = new URLSearchParams(window.location.hash.slice(1));
      return {
        source:    params.get('source')    || 'Source',
        target:    params.get('target')    || 'Target',
        node:      params.get('node')      || 'Node',
        stream:    params.get('stream')    || 'Stream',
        streamAbbr() { return this.stream[0]; },  // S or C etc.
        sourceDB() { return `${this.source} Database`; },
        targetDB() { return `${this.target} Database`; },
        sourceACU() { return `${this.source} ACU (IO/CPU)`; },
        targetACU() { return `${this.target} ACU (IO/CPU)`; },
        nodeName(i) { return `${this.node} ${i + 1}`; },
        streamName(i) { return `${this.stream} ${i + 1}`; },
      };
    })();

    // ── EventBus ──────────────────────────────────────────────────────────
    class EventBus {
      constructor() { this._listeners = {}; }
      on(event, callback) { (this._listeners[event] ||= []).push(callback); }
      off(event, callback) {
        if (!this._listeners[event]) return;
        this._listeners[event] = this._listeners[event].filter(cb => cb !== callback);
      }
      emit(event, data) { (this._listeners[event] || []).forEach(cb => cb(data)); }
    }

    // ── ConfigurationManager ─────────────────────────────────────────────
    class ConfigurationManager {
      constructor(bus) {
        this.bus = bus;
        this._config = {
          tableSize: 100_000_000,    // 100M default
          streamCount: 4,             // 1-16
          partitionCount: 4,         // 1-16
          throughputPerStream: 10_000,// 1k-20k rec/s
          theme: 'professional',     // 'professional' | 'highContrast' | 'dark'
          animationSpeed: 1,         // 0.1-10
          sourceACU: 16,              // 1-64
          targetACU: 16,               // 1-64
          syncNodeCount: 2,         // 1-8
          distribution: 'even',     // 'all-one' | 'skewed' | 'even'
          cpuBoundPercent: 80,      // 0=unlimited, 100=fully CPU bottlenecked
          vcpuPerNode: 4,           // 1-32 vCPUs per sync node
          cpuCapacityBase: 10000,   // rec/s per node at 100% CPU bound with 4 vCPU
          cpuCapacity: 12500,       // effective = base * (vcpu/4) * 100 / cpuBoundPercent
          targetDistribution: 'stacked', // 'stacked' | 'interleaved' | 'scattered'
          partitionSkew: 0,            // 0 = equal, 1 = max imbalance
        };
      }

      get(key) { return this._config[key]; }

      set(key, value) {
        if (this._config[key] === value) return;
        this._config[key] = value;
        // Keep cpuCapacity linked: effective = base * (vcpu/4) * 100 / bound%
        const recalcCapacity = () => {
          if (this._config.cpuBoundPercent === 0) { this._config.cpuCapacity = 0; return; }
          const vcpuScale = this._config.vcpuPerNode / 4;
          this._config.cpuCapacity = Math.round(this._config.cpuCapacityBase * vcpuScale * 100 / this._config.cpuBoundPercent);
        };
        if (key === 'cpuBoundPercent' || key === 'vcpuPerNode') {
          recalcCapacity();
        } else if (key === 'cpuCapacity') {
          // User edited effective directly → recalculate base
          if (this._config.cpuBoundPercent > 0) {
            const vcpuScale = this._config.vcpuPerNode / 4;
            this._config.cpuCapacityBase = Math.round(this._config.cpuCapacity * this._config.cpuBoundPercent / (100 * vcpuScale));
          }
        }
        this.bus.emit('config-changed', { key, value, config: { ...this._config } });
      }

      getAll() { return { ...this._config }; }

      getStreamRanges() {
        const { tableSize, streamCount, partitionCount, partitionsEnabled } = this._config;
        // When aligned, match partition sizes (which may be skewed)
        if (streamCount === partitionCount) {
          return this.getPartitionRanges().map(p => ({
            start: p.start, end: p.end, size: p.end - p.start,
          }));
        }
        const streamSize = Math.ceil(tableSize / streamCount);
        return Array.from({ length: streamCount }, (_, i) => ({
          start: i * streamSize,
          end: Math.min((i + 1) * streamSize, tableSize),
          size: i === streamCount - 1 ? tableSize - i * streamSize : streamSize,
        }));
      }

      getPartitionRanges() {
        const { tableSize, partitionCount, partitionSkew } = this._config;
        const s = partitionSkew || 0;
        const weights = [];
        for (let i = 0; i < partitionCount; i++) {
          const t = partitionCount > 1 ? (i / (partitionCount - 1)) * 2 - 1 : 0;
          weights.push(1 + t * 0.75 * s);
        }
        const totalWeight = weights.reduce((a, b) => a + b, 0);
        const ranges = [];
        let cursor = 0;
        for (let i = 0; i < partitionCount; i++) {
          const size = Math.round(tableSize * weights[i] / totalWeight);
          const end = i === partitionCount - 1 ? tableSize : cursor + size;
          ranges.push({ start: cursor, end, label: `P${i + 1}` });
          cursor = end;
        }
        return ranges;
      }

      _getPartitionHeights() {
        const partRanges = this.getPartitionRanges();
        const tableSize = this.get('tableSize');
        return partRanges.map(p => (p.end - p.start) / tableSize);
      }

      isAligned() {
        const { streamCount, partitionCount } = this._config;
        return streamCount === partitionCount;
      }

      autoAlign() {
        const { streamCount } = this._config;
        this.set('partitionCount', streamCount);
      }

      getNodeAssignment() {
        const { streamCount, syncNodeCount, distribution } = this._config;
        const assignment = Array.from({ length: syncNodeCount }, () => []);
        if (distribution === 'all-one') {
          // All streams on node 1
          for (let i = 0; i < streamCount; i++) assignment[0].push(i);
        } else if (distribution === 'skewed') {
          // First node gets ~half, rest split evenly among remaining nodes
          if (syncNodeCount === 1) {
            for (let i = 0; i < streamCount; i++) assignment[0].push(i);
          } else {
            const firstNodeCount = Math.ceil(streamCount / 2);
            let idx = 0;
            for (let c = 0; c < firstNodeCount; c++) assignment[0].push(idx++);
            for (; idx < streamCount; idx++) {
              assignment[1 + ((idx - firstNodeCount) % (syncNodeCount - 1))].push(idx);
            }
          }
        } else {
          // Even: round-robin across all nodes
          for (let i = 0; i < streamCount; i++) {
            assignment[i % syncNodeCount].push(i);
          }
        }
        return assignment;
      }

      getEffectiveThroughput() {
        const cfg = this._config;
        const activeStreams = cfg.streamCount;

        const sourceCapacity = cfg.sourceACU * 2000;
        const perStreamSource = sourceCapacity / activeStreams;

        const targetCapacity = cfg.targetACU * 2000;
        const perStreamTarget = targetCapacity / activeStreams;

        const nodeAssignment = this.getNodeAssignment();
        const perStreamNode = [];
        for (let i = 0; i < activeStreams; i++) {
          const nodeIdx = nodeAssignment.findIndex(streams => streams.includes(i));
          const streamsOnNode = nodeAssignment[nodeIdx] ? nodeAssignment[nodeIdx].length : 1;
          if (cfg.cpuBoundPercent === 0) {
            perStreamNode.push(Infinity);
          } else {
            perStreamNode.push(cfg.cpuCapacity / streamsOnNode);
          }
        }

        const perStreamEffective = [];
        const bottleneckCounts = { source: 0, sync: 0, target: 0 };
        for (let i = 0; i < activeStreams; i++) {
          const eff = Math.min(perStreamSource, perStreamNode[i], perStreamTarget);
          perStreamEffective.push(eff);
          if (perStreamSource <= perStreamNode[i] && perStreamSource <= perStreamTarget) bottleneckCounts.source++;
          else if (perStreamNode[i] <= perStreamTarget) bottleneckCounts.sync++;
          else bottleneckCounts.target++;
        }
        const bottleneck = bottleneckCounts.source >= bottleneckCounts.sync && bottleneckCounts.source >= bottleneckCounts.target ? 'source'
          : bottleneckCounts.sync >= bottleneckCounts.target ? 'sync' : 'target';

        const totalThroughput = perStreamEffective.reduce((s, v) => s + v, 0);
        const sourceUtil = Math.min(100, (totalThroughput / sourceCapacity) * 100);
        const targetUtil = Math.min(100, (totalThroughput / targetCapacity) * 100);
        const perNodeUtil = nodeAssignment.map((streams, n) => {
          if (cfg.cpuBoundPercent === 0) return 0;
          const nodeThroughput = streams.reduce((s, ci) => s + perStreamEffective[ci], 0);
          return Math.min(100, (nodeThroughput / cfg.cpuCapacity) * 100);
        });
        const maxSyncUtil = cfg.cpuBoundPercent === 0 || perNodeUtil.length === 0 ? 0 : Math.max(...perNodeUtil);

        // Determine all bottlenecks: whichever has the highest utilization
        const maxUtil = Math.max(sourceUtil, maxSyncUtil, targetUtil);
        const bottlenecks = [];
        if (sourceUtil >= maxUtil - 1) bottlenecks.push('source');
        if (maxSyncUtil >= maxUtil - 1) bottlenecks.push('sync');
        if (targetUtil >= maxUtil - 1) bottlenecks.push('target');

        return {
          perStream: perStreamEffective,
          total: totalThroughput,
          bottleneck,
          bottlenecks,
          sourceUtil,
          targetUtil,
          syncUtil: maxSyncUtil,
          perNodeUtil,
        };
      }

      setDurationPreset(targetSeconds) {
        const throughputInfo = this.getEffectiveThroughput();
        const simulatedTime = this._config.tableSize / throughputInfo.total;
        const speed = simulatedTime / targetSeconds;
        this.set('animationSpeed', Math.max(0.1, speed));
      }

    }

    // ── ThemeManager ─────────────────────────────────────────────────────
    class ThemeManager {
      constructor(bus) {
        this.bus = bus;
        this.themes = {
          professional: {
            '--bg-primary': '#ffffff', '--bg-secondary': '#f8fafc', '--bg-panel': '#f1f5f9',
            '--text-primary': '#1e293b', '--text-secondary': '#64748b',
            '--accent-primary': '#2563eb', '--accent-secondary': '#3b82f6',
            '--accent-success': '#22c55e', '--accent-warning': '#f59e0b', '--accent-danger': '#ef4444',
            '--border': '#e2e8f0',
            '--glow-scan': 'rgba(234, 179, 8, 0.6)', '--glow-transfer': 'rgba(59, 130, 246, 0.6)',
            '--db-source': '#6366f1', '--db-target': '#8b5cf6',
            '--stream-colors': ['#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316',
                               '#6366f1','#84cc16','#06b6d4','#e11d48','#a855f7','#10b981','#f43f5e','#0ea5e9'],
          },
          highContrast: {
            '--bg-primary': '#ffffff', '--bg-secondary': '#f0f0f0', '--bg-panel': '#e0e0e0',
            '--text-primary': '#000000', '--text-secondary': '#333333',
            '--accent-primary': '#0000cc', '--accent-secondary': '#0044ff',
            '--accent-success': '#008800', '--accent-warning': '#cc8800', '--accent-danger': '#cc0000',
            '--border': '#999999',
            '--glow-scan': 'rgba(204, 136, 0, 0.8)', '--glow-transfer': 'rgba(0, 68, 255, 0.8)',
            '--db-source': '#0000cc', '--db-target': '#660099',
            '--stream-colors': ['#0044ff','#cc0000','#008800','#cc8800','#660099','#cc0066','#008888','#cc4400',
                               '#0000cc','#668800','#006688','#880044','#8800cc','#006644','#cc2244','#0088cc'],
          },
          dark: {
            '--bg-primary': '#0f172a', '--bg-secondary': '#1e293b', '--bg-panel': '#1e293b',
            '--text-primary': '#e2e8f0', '--text-secondary': '#94a3b8',
            '--accent-primary': '#38bdf8', '--accent-secondary': '#06b6d4',
            '--accent-success': '#4ade80', '--accent-warning': '#fbbf24', '--accent-danger': '#f87171',
            '--border': '#334155',
            '--glow-scan': 'rgba(251, 191, 36, 0.6)', '--glow-transfer': 'rgba(56, 189, 248, 0.6)',
            '--db-source': '#818cf8', '--db-target': '#a78bfa',
            '--stream-colors': ['#38bdf8','#f87171','#4ade80','#fbbf24','#a78bfa','#f472b6','#2dd4bf','#fb923c',
                               '#818cf8','#a3e635','#22d3ee','#fb7185','#c084fc','#34d399','#f43f5e','#0ea5e9'],
          }
        };
        this.bus.on('config-changed', ({ key, value }) => {
          if (key === 'theme') this.apply(value);
        });
      }

      apply(themeName) {
        const theme = this.themes[themeName];
        if (!theme) return;
        Object.entries(theme).forEach(([prop, val]) => {
          if (prop === '--stream-colors') return;
          document.documentElement.style.setProperty(prop, val);
        });
      }

      getStreamColor(index, themeName) {
        const theme = this.themes[themeName || 'professional'];
        return theme['--stream-colors'][index % 16];
      }
    }

    class ConfigPanel {
      constructor(bus, config) {
        this.bus = bus;
        this.config = config;
        this.container = document.getElementById('config-panel');
        this.render();
        this.bindEvents();
        this.bus.on('config-changed', () => this.update());
      }

      render() {
        this.container.innerHTML = `
          <!-- Row 1: Theme -->
          <div class="config-row">
            <div class="config-group">
              <span class="config-label">Theme:</span>
              <select class="config-select" id="theme-select">
                <option value="professional">Professional</option>
                <option value="highContrast">High Contrast</option>
                <option value="dark">Dark</option>
              </select>
            </div>
          </div>

          <!-- Row 2: Table Size + Streams + Partitions -->
          <div class="config-row">
            <div class="config-group">
              <span class="config-label">Table Size:</span>
              <select class="config-select" id="table-size-select">
                <option value="10000000">10M</option>
                <option value="50000000">50M</option>
                <option value="100000000" selected>100M</option>
                <option value="500000000">500M</option>
                <option value="1000000000">1B</option>
              </select>
            </div>
            <div class="config-separator"></div>
            <div class="config-group">
              <span class="config-label">${Labels.stream}s:</span>
              <input type="range" class="config-slider" id="stream-slider" min="1" max="16" value="4">
              <span class="slider-value" id="stream-value">4</span>
            </div>
            <div class="config-separator"></div>
            <div class="config-group">
              <span class="config-label">Partitions:</span>
              <input type="range" class="config-slider" id="partition-slider" min="1" max="16" value="4">
              <span class="slider-value" id="partition-value">4</span>
            </div>
            <div class="config-separator"></div>
            <div class="config-group" id="skew-group">
              <span class="config-label">Partition Skew:</span>
              <input type="range" class="config-slider" id="skew-slider" min="0" max="100" value="0">
              <span class="slider-value" id="skew-value">0%</span>
            </div>
          </div>

          <!-- Row 3: Source ACU + Target ACU -->
          <div class="config-row">
            <div class="config-group">
              <span class="config-label">${Labels.sourceACU()}:</span>
              <input type="range" class="config-slider" id="source-acu-slider" min="1" max="64" value="16">
              <span class="slider-value" id="source-acu-value">16</span>
            </div>
            <div class="config-separator"></div>
            <div class="config-group">
              <span class="config-label">${Labels.targetACU()}:</span>
              <input type="range" class="config-slider" id="target-acu-slider" min="1" max="64" value="16">
              <span class="slider-value" id="target-acu-value">16</span>
            </div>
          </div>

      bindEvents() {
        document.getElementById('theme-select').addEventListener('change', e => {
          this.config.set('theme', e.target.value);
        });
        document.getElementById('table-size-select').addEventListener('change', e => {
          this.config.set('tableSize', parseInt(e.target.value));
        });
        document.getElementById('stream-slider').addEventListener('input', e => {
          this.config.set('streamCount', parseInt(e.target.value));
        });
        document.getElementById('throughput-input').addEventListener('change', e => {
          const val = Math.max(1000, Math.min(20000, parseInt(e.target.value) || 10000));
          e.target.value = val;
          this.config.set('throughputPerStream', val);
        });
        document.getElementById('partition-slider').addEventListener('input', e => {
          this.config.set('partitionCount', parseInt(e.target.value));
        });
        document.getElementById('skew-slider').addEventListener('input', e => {
          this.config.set('partitionSkew', parseInt(e.target.value) / 100);
        });
        document.getElementById('speed-slider').addEventListener('input', e => {
          // Logarithmic: 0=0.1x, 50=10x, 100=10000x
          const val = parseInt(e.target.value);
          const speed = Math.pow(10, (val / 25) - 1);
          this.config.set('animationSpeed', speed);
        });
        document.getElementById('auto-align-btn').addEventListener('click', () => {
          this.config.autoAlign();
        });
        document.getElementById('play-btn').addEventListener('click', () => this.bus.emit('animation-play'));
        document.getElementById('pause-btn').addEventListener('click', () => this.bus.emit('animation-pause'));
        document.getElementById('reset-btn').addEventListener('click', () => this.bus.emit('animation-reset'));
        document.getElementById('step-btn').addEventListener('click', () => this.bus.emit('animation-step'));

        // Export button + dropdown
        const exportBtn = document.getElementById('export-btn');
        const exportDropdown = document.getElementById('export-dropdown');
        exportBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          exportDropdown.style.display = exportDropdown.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', () => { exportDropdown.style.display = 'none'; });
        exportDropdown.addEventListener('click', (e) => e.stopPropagation());

        document.getElementById('export-png').addEventListener('click', () => {
          exportDropdown.style.display = 'none';
          exportBtn.parentElement.style.display = 'none';
          html2canvas(document.body, { backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg-primary') || '#1a1a2e', scale: 2 }).then(canvas => {
            exportBtn.parentElement.style.display = 'inline-block';
            const a = document.createElement('a');
            a.download = 'visualization.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
          }).catch(() => { exportBtn.parentElement.style.display = 'inline-block'; });
        });

        document.getElementById('export-svg').addEventListener('click', () => {
          exportDropdown.style.display = 'none';
          const svg = document.getElementById('main-svg');
          const serializer = new XMLSerializer();
          const svgStr = serializer.serializeToString(svg);
          const blob = new Blob([svgStr], { type: 'image/svg+xml' });
          const a = document.createElement('a');
          a.download = 'visualization.svg';
          a.href = URL.createObjectURL(blob);
          a.click();
          URL.revokeObjectURL(a.href);
        });

        // Source ACU slider

          this.config.set('sourceACU', parseInt(e.target.value));

          this.config.set('syncNodeCount', parseInt(e.target.value));

          this.config.set('cpuBoundPercent', parseInt(e.target.value));

          this.config.set('vcpuPerNode', parseInt(e.target.value));

          this.config.set('cpuCapacity', val);
        });

        // Duration preset buttons

            this.config.setDurationPreset(parseInt(btn.dataset.duration));
            this.container.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

      showNotification(msg) {
        let el = document.getElementById('config-notification');
        if (!el) {
          el = document.createElement('div');
          el.id = 'config-notification';
          el.style.cssText = 'position:fixed;top:12px;right:12px;padding:8px 16px;background:var(--accent-success);color:white;border-radius:6px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;';
          document.body.appendChild(el);

      update() {
        const cfg = this.config.getAll();
        document.getElementById('stream-slider').value = cfg.streamCount;
        document.getElementById('stream-value').textContent = cfg.streamCount;
        document.getElementById('partition-slider').value = cfg.partitionCount;
        document.getElementById('partition-value').textContent = cfg.partitionCount;
        document.getElementById('skew-slider').value = Math.round((cfg.partitionSkew || 0) * 100);
        document.getElementById('skew-value').textContent = Math.round((cfg.partitionSkew || 0) * 100) + '%';
        // Speed slider (logarithmic)
        const speedLog = (Math.log10(cfg.animationSpeed) + 1) * 25;
        document.getElementById('speed-slider').value = Math.max(0, Math.min(100, speedLog));
        const speedStr = cfg.animationSpeed >= 100 ? Math.round(cfg.animationSpeed) + 'x' :
                         cfg.animationSpeed >= 10 ? cfg.animationSpeed.toFixed(0) + 'x' :
                         cfg.animationSpeed >= 1 ? cfg.animationSpeed.toFixed(1) + 'x' :
                         cfg.animationSpeed.toFixed(2) + 'x';
        document.getElementById('speed-value').textContent = speedStr;
        const badge = document.getElementById('alignment-badge');

          badge.className = 'alignment-badge aligned';
